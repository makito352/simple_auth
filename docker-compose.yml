# ==========================================================================
# Project: SimpleAuth Infrastructure
# Description: Docker configuration for backend, frontend, and proxy.
# Last Updated: 2026-07-08
# ==========================================================================

services:
  # ============================
  # PostgreSQL
  # ============================
  db:
    image: postgres:16
    container_name: simpleauth-db
    restart: always
    # ヘルスチェックを追加（DBの起動を待つための準備）
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 60s
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d
    networks:
      - simpleauth-net

  # ============================
  # Backend (FastAPI)
  # ============================
  backend:
    build: ./backend
    container_name: simpleauth-backend
    restart: always
    environment:
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_DB: ${POSTGRES_DB}
      DATABASE_NAME: ${DATABASE_NAME}
      SESSION_TOKEN_SECRET: ${SESSION_TOKEN_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SESSION_EXPIRE_DAYS: ${SESSION_EXPIRE_DAYS}
      ONE_TIME_LINK_EXPIRE_MINUTES: ${ONE_TIME_LINK_EXPIRE_MINUTES}
      DEVICE_REGISTRATION_LINK_EXPIRE_MINUTES: ${DEVICE_REGISTRATION_LINK_EXPIRE_MINUTES}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME}
      CORS_ORIGINS: ${FRONTEND_BASE_URL}
      WEB_AUTHN_RP_ID: ${SERVER_HOSTNAME}
      WEB_AUTHN_RP_NAME: ${WEB_AUTHN_RP_NAME}
      WEB_AUTHN_ORIGIN: ${FRONTEND_BASE_URL}
      BACKEND_BASE_URI: ${BACKEND_BASE_URI}
      BACKEND_PROXY_PREFIX: ${BACKEND_PROXY_PREFIX}
      OIDC_JWT_PRIVATE_KEY_PATH: /app/keys/oidc_private.pem
      OIDC_JWT_PUBLIC_KEY_PATH: /app/keys/oidc_public.pem
      INITIAL_ADMIN_USER_EMAIL: ${INITIAL_ADMIN_USER_EMAIL}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      ENV: ${ENV}
    volumes:
      - ./backend/secrets/oidc_private.pem:/app/keys/oidc_private.pem:ro
      - ./backend/secrets/oidc_public.pem:/app/keys/oidc_public.pem:ro
      - backend_icon:/app/app/static
    # nginxでリバースプロキシするため、直接ポートを公開しない
    # ports:
    #   - 8000:8000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - simpleauth-net

  # ============================
  # Frontend (Next.js)
  # ============================
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${BACKEND_BASE_URI}
        - NEXT_PUBLIC_ENV=${ENV}
        - BACKEND_INTERNAL_URL=${INTERNAL_BACKEND_API_URL}
    container_name: simpleauth-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${BACKEND_BASE_URI}
      NEXT_PUBLIC_ENV: ${ENV}
      BACKEND_INTERNAL_URL: ${INTERNAL_BACKEND_API_URL}
      NODE_ENV: ${ENV}
    depends_on:
      - backend
    # nginxでリバースプロキシするため、直接ポートを公開しない
    # ports:
    #   - 3000:3000
    networks:
      - simpleauth-net

  # ============================
  # nginx (Reverse Proxy)
  # ============================
  nginx:
    build: ./infra/nginx
    container_name: simpleauth-nginx
    restart: always
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf.base:ro
      - ./infra/nginx/auth_request.conf:/etc/nginx/auth_request.conf:ro
      - ./infra/nginx/ssl/:/etc/nginx/ssl/:ro
      - ./infra/nginx/conf.d/main.conf.base:/etc/nginx/conf.d/main.conf.base:ro
    environment:
      SERVER_HOSTNAME: ${SERVER_HOSTNAME}
      SSL_CERTIFICATE_PATH: ${SSL_CERTIFICATE_PATH}
      SSL_CERTIFICATE_KEY_PATH: ${SSL_CERTIFICATE_KEY_PATH}
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    networks:
      - simpleauth-net

# ============================
# Networks & Volumes
# ============================
networks:
  simpleauth-net:

volumes:
  db_data:
  backend_icon:
