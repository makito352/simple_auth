# ==========================================================================
# Project: SimpleAuth Infrastructure
# Description: 開発環境向けoverride 用ファイル
# Last Updated: 2026-07-08
# ==========================================================================
services:
  # ============================
  # Backend (FastAPI)
  # (開発環境ではnginxを介さず直接ポートを公開する)
  # ============================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev # 開発時はこちらを指定
    volumes:
      - ./backend:/app  # ホストのソースをコンテナにマウント
    ports:
      - 8000:8000
  # ============================
  # Frontend (Next.js)
  # (開発環境ではnginxを介さず直接ポートを公開する)
  # ============================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev # 開発時はこちらを指定
    volumes:
      - ./frontend:/app  # ホストのソースをコンテナにマウント
      - /app/node_modules # node_modulesだけはホスト側と混ざらないように匿名ボリュームで保護
    environment:
      # 開発環境用でallowedDevOrigins 設定に使用
      NEXT_PUBLIC_HOSTNAME: ${SERVER_HOSTNAME}
    ports:
      - 3000:3000
